<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandaman 🐼</title>
    
    <!-- Mempercepat koneksi DNS ke server Google Script -->
    <link rel="preconnect" href="https://script.google.com">

    <style>
        /* Mengatur body dan html agar tidak ada margin/padding bawaan browser */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda dari body */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Background modern gelap */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; /* Untuk menempatkan captcha di tengah */
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
        }

        /* Canvas untuk background animasi */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Agar tidak menghalangi klik ke elemen UI */
        }

        /* Mode setelah berhasil verifikasi */
        body.verified {
            display: block; /* Menghilangkan flex agar iframe normal penuh */
            background-color: #ffffff;
        }
        
        body.verified #bg-canvas {
            display: none; /* Sembunyikan animasi angka saat iframe dimuat */
        }

        /* --- STYLING UNTUK KOTAK CAPTCHA (Efek Glassmorphism) --- */
        #captcha-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #captcha-container h2 {
            margin: 0 0 10px 0;
            color: #1e293b;
            font-size: 24px;
            font-weight: 700;
        }

        #captcha-container p {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.5;
        }

        #captcha-question {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            padding: 20px;
            border-radius: 12px;
            letter-spacing: 3px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        #captcha-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
            background: #ffffff;
            color: #334155;
            font-weight: 600;
        }

        #captcha-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        #verify-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        #verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        #error-msg {
            color: #ef4444;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            font-weight: 600;
        }

        /* Animasi bergetar saat jawaban salah */
        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* --- STYLING UNTUK IFRAME --- */
        /* Iframe awalnya disembunyikan */
        #main-iframe {
            display: none; 
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>

<body>

    <!-- Canvas untuk Animasi Angka -->
    <canvas id="bg-canvas"></canvas>

    <!-- Kontainer Verifikasi Captcha -->
    <div id="captcha-container">
        <h2>Verifikasi Keamanan 🔒</h2>
        <p>Selesaikan soal di bawah ini untuk membuktikan Anda adalah manusia.</p>
        
        <div id="captcha-question">...</div>
        
        <input type="number" id="captcha-input" placeholder="Masukkan jawaban Anda" autocomplete="off">
        <button id="verify-btn">Verifikasi Akses</button>
        
        <div id="error-msg">Jawaban salah! Silakan coba lagi.</div>
    </div>

    <!-- Iframe utama (URL tidak diatur di awal untuk mencegah pemuatan data di belakang layar) -->
    <iframe id="main-iframe" title="Password Manager" loading="lazy"></iframe>

    <script>
        let expectedAnswer = 0;
        let isVerified = false;

        // --- ANIMASI LATAR BELAKANG (ANGKA BERGERAK) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            // Menentukan kepadatan partikel (semakin kecil pembagi, semakin banyak angka)
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 8000); 

            for (let i = 0; i < numberOfParticles; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 20 + 10; // Ukuran font antara 10 - 30px
                const speedX = (Math.random() * 1) - 0.5; // Kecepatan horizontal
                const speedY = (Math.random() * 1) - 0.5; // Kecepatan vertikal
                const number = Math.floor(Math.random() * 10); // Angka acak 0-9
                const opacity = Math.random() * 0.2 + 0.05; // Transparansi halus
                particlesArray.push({ x, y, size, speedX, speedY, number, opacity });
            }
        }

        function animateCanvas() {
            if (isVerified) return; // Hentikan kalkulasi animasi jika pengguna sudah terverifikasi (hemat baterai/CPU)
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                let p = particlesArray[i];
                
                // Render teks/angka ke layar
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.font = `bold ${p.size}px 'Segoe UI', Arial, sans-serif`;
                ctx.fillText(p.number, p.x, p.y);
                
                // Update posisi untuk frame berikutnya
                p.x += p.speedX;
                p.y += p.speedY;
                
                // Pantulkan angka jika menyentuh batas layar
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                
                // Ubah angka secara acak kadang-kadang untuk efek teknologis (matrix-style)
                if (Math.random() < 0.01) p.number = Math.floor(Math.random() * 10);
            }
            requestAnimationFrame(animateCanvas);
        }

        // Jalankan ulang kalkulasi canvas jika orientasi layar HP diubah
        window.addEventListener('resize', () => {
            if (!isVerified) initCanvas();
        });


        // --- LOGIKA CAPTCHA MATEMATIKA ---
        function generateCaptcha() {
            // Menghasilkan angka acak dari 1 sampai 10
            let num1 = Math.floor(Math.random() * 10) + 1;
            let num2 = Math.floor(Math.random() * 10) + 1;
            
            // Pilihan operator acak
            const operators = ['+', '-', 'x'];
            const operator = operators[Math.floor(Math.random() * operators.length)];

            // Jika pengurangan, pastikan angka pertama lebih besar (mencegah hasil minus)
            if (operator === '-' && num1 < num2) {
                let temp = num1;
                num1 = num2;
                num2 = temp;
            }

            // Menghitung jawaban yang benar
            switch(operator) {
                case '+': expectedAnswer = num1 + num2; break;
                case '-': expectedAnswer = num1 - num2; break;
                case 'x': expectedAnswer = num1 * num2; break;
            }

            document.getElementById('captcha-question').innerText = `${num1} ${operator} ${num2} = ?`;
            document.getElementById('captcha-input').value = '';
            
            // Fokus otomatis ke input (diberi jeda agar animasi CSS selesai dulu)
            setTimeout(() => {
                document.getElementById('captcha-input').focus();
            }, 100);
        }

        function verifyCaptcha() {
            const userInput = document.getElementById('captcha-input').value;
            const errorMsg = document.getElementById('error-msg');
            const container = document.getElementById('captcha-container');

            if (userInput === '') {
                errorMsg.innerText = "Jawaban tidak boleh kosong!";
                errorMsg.style.display = 'block';
                triggerShake(container);
                return;
            }

            if (parseInt(userInput, 10) === expectedAnswer) {
                // Berhasil verifikasi: Hentikan animasi angka & sembunyikan kotak
                isVerified = true;
                container.style.display = 'none';
                errorMsg.style.display = 'none';
                
                // Ubah background & bersihkan layar
                document.body.classList.add('verified');

                // Tampilkan iframe dan mulai muat halaman Google Script Anda
                const iframe = document.getElementById('main-iframe');
                iframe.style.display = 'block';
                iframe.src = "https://script.google.com/macros/s/AKfycbwGtIduYFjEdk3aIcCyr5huKRv9IZx3wxKMTbN_Ts9-5L5D76T4UO1IHlIgENEL9nEljQ/exec";
            } else {
                // Jawaban salah: Tampilkan error, putar animasi bergetar, dan muat soal baru
                errorMsg.innerText = "Jawaban salah! Silakan coba lagi.";
                errorMsg.style.display = 'block';
                triggerShake(container);
                generateCaptcha();
            }
        }

        // Fungsi pembantu untuk memutar ulang animasi bergetar (shake)
        function triggerShake(element) {
            element.classList.remove('shake-animation');
            void element.offsetWidth; // Memaksa reflow browser agar animasi bisa diputar ulang
            element.classList.add('shake-animation');
        }

        // --- INISIALISASI SAAT HALAMAN DIMUAT ---
        window.onload = () => {
            initCanvas();
            animateCanvas();
            generateCaptcha();
        };

        // Event listener klik tombol verifikasi
        document.getElementById('verify-btn').addEventListener('click', verifyCaptcha);

        // Memungkinkan menekan tombol "Enter" pada keyboard
        document.getElementById('captcha-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyCaptcha();
            }
        });
    </script>
</body>
</html>
