<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT</title>
    
    <!-- Mempercepat koneksi DNS ke server Google Script -->
    <link rel="preconnect" href="https://script.google.com">

    <style>
        /* Mengatur body dan html agar tidak ada margin/padding bawaan browser */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya scrollbar ganda dari body */
            background-color: #ffffff;
        }

        /* Memastikan iframe mengambil 100% ruang layar yang tersedia */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block; /* Menghilangkan gap spasi putih di bawah iframe */
        }
    </style>
</head>

<body>
    <!-- Iframe langsung dipanggil tanpa div pembungkus yang tidak perlu -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbwxif6e5-uBCmsOjAUALKFo4u51_6HIGmBhZXotO7c6t-e89ITG0qFKo5W9SpneJ84P/exec" 
        title="Password Manager"
        loading="lazy">
    </iframe>
</body>
</html>
